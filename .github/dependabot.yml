version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    # Disable updates except for vulnerabilities
    open-pull-requests-limit: 0
    schedule:
      interval: monthly
    commit-message:
      prefix: "build"
      include: "scope"
  - package-ecosystem: github-actions
    directory: /
    # Disable updates except for vulnerabilities
    open-pull-requests-limit: 0
    schedule:
      interval: monthly
    commit-message:
      prefix: "build"
      include: "scope"
